<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacking OS Prototype</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="desktop">
  <div class="icon" onclick="openApp('terminal')">
    <div class="icon-img">💻</div>
    <div class="icon-label">Terminal</div>
  </div>
  <div class="icon" onclick="openApp('mission')">
    <div class="icon-img">📄</div>
    <div class="icon-label">Mission Brief</div>
  </div>
  <div class="icon" onclick="openApp('cheatsheet')">
    <div class="icon-img">📘</div>
    <div class="icon-label">Cheat Sheet</div>
  </div>
</div>

<!-- Terminal Window -->
<div id="terminal" class="window">
  <div class="title-bar">Terminal</div>
  <div class="window-content">
    <div id="terminal-output"></div>
    <input id="terminal-input" placeholder="Type command..." />
  </div>
</div>

<!-- Cheat Sheet Window -->
<div id="cheatsheet" class="window">
  <div class="title-bar">Cheat Sheet</div>
  <div class="window-content" id="cheatsheet-content"></div>
</div>

<!-- Mission Window -->
<div id="mission" class="window">
  <div class="title-bar">Mission Brief</div>
  <div class="window-content" id="mission-content"></div>
</div>

<script src="os.js"></script>
<script src="terminal.js"></script>
<script src="mission.js"></script>
</body>
</html>
