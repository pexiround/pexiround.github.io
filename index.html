<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRATTTISSSSSS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0914;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .wishes-container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            padding: 2.5rem 3.5rem;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }
        h1 { font-size: 3.5rem; color: #fff; letter-spacing: 1px; }
        .instruction { color: rgba(255, 255, 255, 0.5); margin-top: 10px; font-size: 0.9rem; }
        .balloon {
            position: absolute;
            bottom: -120px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            z-index: 5;
            animation: rise 7s linear forwards;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 24px;
            width: 1px;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.4);
        }
        .floating-text {
            position: absolute;
            color: rgba(255, 255, 255, 0.08);
            white-space: nowrap;
            font-weight: 700;
            pointer-events: none;
            z-index: 1;
            user-select: none;
            animation: flyHorizontal linear forwards;
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes rise { 0% { transform: translateY(0) translateX(0) rotate(0deg); } 50% { transform: translateY(-60vh) translateX(20px) rotate(3deg); } 100% { transform: translateY(-130vh) translateX(-10px) rotate(-3deg); } }
        @keyframes flyHorizontal { 0% { left: -300px; } 100% { left: 105vw; } }
    </style>
</head>
<body>

    <div class="wishes-container">
        <h1>GRATTISSSSS 🎂</h1>
        <p class="instruction">(testa klicka ballongerna)</p>
    </div>

    <script>
        const catUrls = [
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQUoTXPh-uMj39OaszhWUMJRwYkL09XQtTEP_d6jh0vwQ&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJb3lp6CG0fl-3y9ddIyDGfMy2hSRTOGH_rP0DGpTz_w&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQinJ2bHBIGOEyhlvsrcU4-N3Q1eInxIePjSUQErlAtuA&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQqU96z5bnNNBm02cc3v5KiWThCDVs1LlOc_0CwAfRtrw&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQWL_Ve_SLU1qE1dx--sw9cszpEPug9EmYLnlK09hzO-g&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRENWso14T0sFfJod7XbrlG2zg53BQC61GPtlUsnJf9kA&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSif05VpplPskTGrYClV5Lj1nvc4ibz1LzW9ynPAXwO4w&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSn6x3YgWRZTzAGvO-BhMnTOZMjoarHfb-zo2ZZe_-o3g&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnPmEZgor2ar3cO-eEC9SVtI12w7uvqq6h3DvUcTeAdw&s=10', 
            'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcToXjCwS-TDbNeLxdVEhHFxxBIf1FG5Gmc7BUqgEzPp0A&s'
        ];

        const birthdayLanguages = ["¡Feliz Cumpleaños!", "Joyeux Anniversaire", "Alles Gute zum Geburtstag", "Buon Compleanno", "お誕生日おめでとう", "Feliz Aniversário", "생일 축하합니다", "生日快乐", "Sretan Rođendan", "Fijne Verjaardag", "Grattis på födelsedagen", "Happy Birthday", "С днем рождения", "عيد ميلاد سعيد", "Doğum günün kutlu olsun", "Wszystkiego najlepszego", "Hyvää syntymäpäivää", "Tillykke med fødselsdagen", "Gratulerer med dagen", "Χρόνια Πολλά", "जन्मदिन की शुभकामनाएँ", "Selamat ulang tahun", "Všechno nejlepší", "Boldog születésnapot", "Maligayang Kaarawan", "З днем народження", "יום הולדת שמח", "สุขสันต์วันเกิด", "Chúc mừng sinh nhật", "La mulți ani", "Честит рожден ден", "Všetko najlepšie", "Vse najboljše", "Срећан рођендан", "Su gimtadieniu", "Daudz laimes dzimšanas dienā", "Palju õnne sünnipäevaks", "Til hamingju med afmälið", "Lá breithe shona duit", "Penblwydd hapus", "Heri ya siku ya kuzaliwa", "Selamat hari lahir", "تولدت مبارک", "শুভ জন্মদিন", "ਜਨਮਦิน ਮੁਬਾਰਕ", "سالگرہ مبارک", "Per molts anys", "Veels geluk met jou verjaarsdag", "Gëzuar ditëlindjen", "Ծնունդդ շնորհավոր", "გილოცავ დაბადების დღეს", "Għeluq sninek it-tajjeb", "Alles Guddes fir däi Gebuertsdag", "Feliĉan naskiĝtagon", "Felix sit natalis dies"];
        const balloonColors = ['#ff2d55', '#007aff', '#34c759', '#ffcc00', '#af52de', '#ff9500'];

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            balloon.style.left = `${Math.random() * 95}vw`;
            balloon.style.animationDuration = `${5 + Math.random() * 5}s`;
            balloon.style.transform = `scale(${0.8 + Math.random() * 0.5})`;

            balloon.onclick = function() {
                const cat = document.createElement('img');
                cat.src = catUrls[Math.floor(Math.random() * catUrls.length)];
                cat.style.position = 'fixed';
                cat.style.top = '50%';
                cat.style.left = '50%';
                cat.style.transform = 'translate(-50%, -50%)';
                cat.style.width = '250px';
                cat.style.borderRadius = '15px';
                cat.style.zIndex = '100';
                document.body.appendChild(cat);
                setTimeout(() => cat.remove(), 800);
                balloon.remove();
            };

            document.body.appendChild(balloon);
            setTimeout(() => { if(balloon.parentNode) balloon.remove(); }, 10000);
        }

        function createFlyingText() {
            const textElement = document.createElement('div');
            textElement.classList.add('floating-text');
            textElement.innerText = birthdayLanguages[Math.floor(Math.random() * birthdayLanguages.length)];
            textElement.style.top = `${Math.random() * 90}vh`;
            textElement.style.animationDuration = `${10 + Math.random() * 10}s`;
            textElement.style.fontSize = `${1 + Math.random() * 1.2}rem`;
            document.body.appendChild(textElement);
            setTimeout(() => textElement.remove(), 20000);
        }

        setInterval(createBalloon, 1000);
        setInterval(createFlyingText, 1200);
    </script>
</body>
</html>
