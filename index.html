<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Designer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎨 Pixel Designer</h1>

<div id="controls">
    Rows: <input type="number" id="rows" value="16" min="1" max="100">
    Columns: <input type="number" id="cols" value="16" min="1" max="100">
    <button id="create">Create Grid</button>
    <input type="color" id="color" value="#00ff00">
    <button id="clear">Clear</button>
</div>

<div id="grid"></div>

<script src="script.js"></script>
</body>
</html>
