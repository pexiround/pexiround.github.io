<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZelloStudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Builder UI Controls */
        .canvas-section { position: relative; border: 2px border-transparent; transition: all 0.2s ease; }
        .canvas-section:hover { border-color: #3b82f6; }
        .action-overlay { opacity: 0; transition: opacity 0.2s ease; }
        .canvas-section:hover .action-overlay { opacity: 1; }
        
        /* Preview Mode Hides Controls */
        .preview-mode .action-overlay { display: none !important; }
        .preview-mode .canvas-section { border-color: transparent !important; }
        .preview-mode [contenteditable] { outline: none !important; cursor: default; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden">

    <header class="bg-gray-900 border-b border-gray-800 h-16 flex items-center justify-between px-6 z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-layer-group text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white">ZelloStudio</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button class="text-sm font-medium text-gray-400 hover:text-white transition flex items-center gap-2 mr-2">
                <i class="fa-solid fa-lock text-xs"></i> Upgrade (Coming Soon)
            </button>
            
            <button onclick="togglePreview()" id="previewBtn" class="flex items-center gap-2 px-4 py-2 bg-gray-800 hover:bg-gray-700 text-sm font-medium rounded-lg transition cursor-pointer">
                <i class="fa-solid fa-eye text-gray-400"></i> <span>Preview</span>
            </button>
            <button onclick="clearCanvas()" class="flex items-center gap-2 px-4 py-2 bg-red-950/30 hover:bg-red-900/50 text-red-400 text-sm font-medium rounded-lg border border-red-900/50 transition cursor-pointer">
                <i class="fa-solid fa-trash"></i> Clear
            </button>
            <button onclick="exportProject()" class="flex items-center gap-2 px-5 py-2 bg-blue-600 hover:bg-blue-700 text-sm font-semibold rounded-lg text-white shadow-lg shadow-blue-500/20 transition cursor-pointer">
                <i class="fa-solid fa-download"></i> Export Website
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside id="sidebar" class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col h-full transition-all duration-300 shrink-0">
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Components</h2>
                <p class="text-xs text-gray-400 mt-1">Click to add to canvas.</p>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar">
                
                <div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase tracking-wider block mb-2">Navigation</span>
                    <button onclick="addComponent('nav')" class="w-full text-left p-3 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition group cursor-pointer flex justify-between items-center">
                        <span class="text-sm font-medium">Standard Header</span>
                        <i class="fa-solid fa-plus text-xs text-gray-500 group-hover:text-white"></i>
                    </button>
                </div>

                <div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase tracking-wider block mb-2">Heroes</span>
                    <button onclick="addComponent('hero')" class="w-full text-left p-3 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition group cursor-pointer flex justify-between items-center mb-2">
                        <span class="text-sm font-medium">Main Hero</span>
                        <i class="fa-solid fa-plus text-xs text-gray-500 group-hover:text-white"></i>
                    </button>
                </div>

                <div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase tracking-wider block mb-2">Content</span>
                    <button onclick="addComponent('features')" class="w-full text-left p-3 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition group cursor-pointer flex justify-between items-center">
                        <span class="text-sm font-medium">3-Column Grid</span>
                        <i class="fa-solid fa-plus text-xs text-gray-500 group-hover:text-white"></i>
                    </button>
                </div>
                
                <div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase tracking-wider block mb-2">Footers</span>
                    <button onclick="addComponent('footer')" class="w-full text-left p-3 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition group cursor-pointer flex justify-between items-center">
                        <span class="text-sm font-medium">Simple Footer</span>
                        <i class="fa-solid fa-plus text-xs text-gray-500 group-hover:text-white"></i>
                    </button>
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-800 bg-gray-900 text-xs text-gray-400">
                <i class="fa-solid fa-pen mr-1 text-blue-400"></i> Click any text on the canvas to edit it live.
            </div>
        </aside>

        <main class="flex-1 bg-gray-950 overflow-y-auto relative no-scrollbar p-8 flex justify-center">
            
            <div id="canvasViewport" class="w-full max-w-5xl bg-white min-h-[700px] rounded-xl shadow-2xl overflow-hidden border border-gray-800 flex flex-col transition-all duration-300">
                
                <div class="bg-gray-100 px-4 py-2 flex items-center border-b border-gray-200 gap-2 shrink-0 select-none">
                    <div class="flex gap-1.5">
                        <span class="w-3 h-3 rounded-full bg-red-400"></span>
                        <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
                        <span class="w-3 h-3 rounded-full bg-green-400"></span>
                    </div>
                    <div class="mx-auto bg-white rounded flex-1 max-w-md text-center text-xs text-gray-400 py-1 border border-gray-200">
                        <i class="fa-solid fa-lock text-[10px] text-gray-400 mr-1"></i> mysite.com
                    </div>
                </div>

                <div id="canvasRoot" class="flex-1 bg-white text-gray-900 overflow-y-auto">
                    <div id="canvasPlaceholder" class="flex flex-col items-center justify-center h-full py-32 text-center select-none">
                        <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center text-gray-300 border-2 border-gray-100 border-dashed mb-4">
                            <i class="fa-solid fa-layer-group text-2xl"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-700">Canvas is Empty</h3>
                        <p class="text-sm text-gray-500 mt-1 max-w-xs">Add components from the sidebar to start building your website.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // COMPONENT HTML DICTIONARY
        const templates = {
            nav: `
                <nav class="bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between">
                    <div class="text-xl font-bold text-gray-900" contenteditable="true">Brand.</div>
                    <div class="hidden md:flex gap-6 text-sm font-medium text-gray-500">
                        <a href="#" contenteditable="true">Home</a>
                        <a href="#" contenteditable="true">Features</a>
                        <a href="#" contenteditable="true">Pricing</a>
                    </div>
                    <div>
                        <a href="#" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-semibold" contenteditable="true">Get Started</a>
                    </div>
                </nav>
            `,
            hero: `
                <section class="bg-white py-24 px-8 text-center">
                    <div class="max-w-3xl mx-auto">
                        <h1 class="text-5xl font-extrabold text-gray-900 tracking-tight mb-6 leading-tight" contenteditable="true">
                            Build something amazing today.
                        </h1>
                        <p class="text-lg text-gray-500 mb-8 max-w-2xl mx-auto" contenteditable="true">
                            Launch your next project with our intuitive tools and powerful infrastructure. No coding required.
                        </p>
                        <div class="flex justify-center gap-4">
                            <a href="#" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold shadow-lg shadow-blue-600/20" contenteditable="true">Start for free</a>
                            <a href="#" class="bg-gray-100 text-gray-900 px-6 py-3 rounded-lg font-semibold" contenteditable="true">Learn more</a>
                        </div>
                    </div>
                </section>
            `,
            features: `
                <section class="bg-gray-50 py-20 px-8">
                    <div class="max-w-5xl mx-auto grid md:grid-cols-3 gap-8">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center mb-4"><i class="fa-solid fa-bolt"></i></div>
                            <h3 class="text-lg font-bold text-gray-900 mb-2" contenteditable="true">Lightning Fast</h3>
                            <p class="text-gray-500 text-sm leading-relaxed" contenteditable="true">Optimized for speed and performance right out of the box.</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center mb-4"><i class="fa-solid fa-shield"></i></div>
                            <h3 class="text-lg font-bold text-gray-900 mb-2" contenteditable="true">Secure Design</h3>
                            <p class="text-gray-500 text-sm leading-relaxed" contenteditable="true">Enterprise-grade security built into every component.</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center mb-4"><i class="fa-solid fa-mobile-screen"></i></div>
                            <h3 class="text-lg font-bold text-gray-900 mb-2" contenteditable="true">Responsive</h3>
                            <p class="text-gray-500 text-sm leading-relaxed" contenteditable="true">Looks perfect on desktops, tablets, and mobile devices.</p>
                        </div>
                    </div>
                </section>
            `,
            footer: `
                <footer class="bg-white border-t border-gray-100 py-10 px-8 text-center">
                    <div class="text-xl font-bold text-gray-900 mb-2" contenteditable="true">Brand.</div>
                    <p class="text-gray-400 text-sm" contenteditable="true">&copy; 2026 Your Company. All rights reserved.</p>
                </footer>
            `
        };

        const canvasRoot = document.getElementById('canvasRoot');
        let isPreviewMode = false;

        // Add component to canvas
        function addComponent(type) {
            const placeholder = document.getElementById('canvasPlaceholder');
            if (placeholder) placeholder.remove();

            const section = document.createElement('div');
            section.className = 'canvas-section group';
            section.innerHTML = templates[type];

            // Action overlay (Move / Delete)
            const overlay = document.createElement('div');
            overlay.className = 'action-overlay absolute top-2 right-2 flex gap-1 bg-gray-900 p-1 rounded-md shadow-lg z-40';
            overlay.innerHTML = `
                <button onclick="moveUp(this.closest('.canvas-section'))" class="p-1.5 text-xs text-gray-300 hover:text-white bg-gray-800 rounded"><i class="fa-solid fa-arrow-up"></i></button>
                <button onclick="moveDown(this.closest('.canvas-section'))" class="p-1.5 text-xs text-gray-300 hover:text-white bg-gray-800 rounded"><i class="fa-solid fa-arrow-down"></i></button>
                <button onclick="deleteSection(this.closest('.canvas-section'))" class="p-1.5 text-xs text-red-400 hover:text-white bg-gray-800 rounded ml-1"><i class="fa-solid fa-trash"></i></button>
            `;
            
            section.appendChild(overlay);
            canvasRoot.appendChild(section);
        }

        // Section Controls
        function deleteSection(el) {
            el.remove();
            if (canvasRoot.children.length === 0) location.reload();
        }
        function moveUp(el) {
            if (el.previousElementSibling) canvasRoot.insertBefore(el, el.previousElementSibling);
        }
        function moveDown(el) {
            if (el.nextElementSibling) canvasRoot.insertBefore(el.nextElementSibling, el);
        }
        function clearCanvas() {
            if(confirm("Clear the entire canvas?")) location.reload();
        }

        // Preview Mode Toggle
        function togglePreview() {
            isPreviewMode = !isPreviewMode;
            const viewport = document.getElementById('canvasViewport');
            const btn = document.getElementById('previewBtn');
            const sidebar = document.getElementById('sidebar');

            if (isPreviewMode) {
                document.body.classList.add('preview-mode');
                sidebar.style.width = '0px';
                sidebar.style.opacity = '0';
                viewport.classList.remove('max-w-5xl', 'rounded-xl', 'border');
                viewport.classList.add('w-full', 'max-w-full', 'rounded-none', 'border-none');
                btn.innerHTML = `<i class="fa-solid fa-pen text-blue-400"></i> <span>Edit</span>`;
                
                // Disable contenteditable
                document.querySelectorAll('[contenteditable]').forEach(el => el.setAttribute('contenteditable', 'false'));
            } else {
                document.body.classList.remove('preview-mode');
                sidebar.style.width = '18rem';
                sidebar.style.opacity = '1';
                viewport.classList.add('max-w-5xl', 'rounded-xl', 'border');
                viewport.classList.remove('w-full', 'max-w-full', 'rounded-none', 'border-none');
                btn.innerHTML = `<i class="fa-solid fa-eye text-gray-400"></i> <span>Preview</span>`;
                
                // Enable contenteditable
                document.querySelectorAll('[contenteditable]').forEach(el => el.setAttribute('contenteditable', 'true'));
            }
        }

        // BUG-FREE EXPORT PIPELINE
        // We use strict string concatenation to avoid template literal leakage issues in the browser
        function exportProject() {
            if (canvasRoot.children.length === 0 || document.getElementById('canvasPlaceholder')) {
                alert("Add some components to the canvas first.");
                return;
            }

            const clone = canvasRoot.cloneNode(true);
            
            // Clean UI elements
            clone.querySelectorAll('.action-overlay').forEach(el => el.remove());
            clone.querySelectorAll('[contenteditable]').forEach(el => {
                el.removeAttribute('contenteditable');
            });

            // Extract pure HTML
            let innerCode = "";
            clone.querySelectorAll('.canvas-section').forEach(section => {
                innerCode += section.innerHTML.trim() + "\n";
            });

            // Constructing string safely
            let finalHTML = "<!DOCTYPE html>\n";
            finalHTML += "<html lang=\"en\">\n<head>\n";
            finalHTML += "    <meta charset=\"UTF-8\">\n";
            finalHTML += "    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n";
            finalHTML += "    <title>My ZelloStudio Site</title>\n";
            finalHTML += "    <script src=\"https://cdn.tailwindcss.com\"><\/script>\n";
            finalHTML += "    <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css\">\n";
            finalHTML += "    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'); body { font-family: 'Inter', sans-serif; }</style>\n";
            finalHTML += "</head>\n<body class=\"bg-white\">\n";
            finalHTML += innerCode;
            finalHTML += "\n</body>\n</html>";

            // Trigger download
            const blob = new Blob([finalHTML], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'index.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
